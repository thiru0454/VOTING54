<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In</title>
    <style>
        /* Global Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: #f4f7fc;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            transition: opacity 0.5s ease-out;
        }

        /* Navbar */
        nav {
            background-color: #25b09b;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
        }

        nav .logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: white;
        }

        /* Loader */
        .loader {
            width: 50px;
            aspect-ratio: 1;
            display: grid;
        }

        .loader::before,
        .loader::after {    
            content: "";
            grid-area: 1/1;
            --c: no-repeat radial-gradient(farthest-side, #25b09b 92%, #0000);
            background: 
                var(--c) 50%  0, 
                var(--c) 50%  100%, 
                var(--c) 100% 50%, 
                var(--c) 0    50%;
            background-size: 12px 12px;
            animation: l12 1s infinite;
        }

        .loader::before {
            margin: 4px;
            filter: hue-rotate(45deg);
            background-size: 8px 8px;
            animation-timing-function: linear;
        }

        @keyframes l12 { 
            100% { transform: rotate(.5turn) }
        }

        /* Center loader */
        .loader-container {
            display: flex;
            justify-content: center;
            align-items: center;
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #fff;
            z-index: 9999;
        }

        /* Sign In Form */
        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            opacity: 1;
            transition: opacity 0.5s ease-in;
        }

        .login-box {
            background-color: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            width: 300px;
            text-align: center;
        }

        h2 {
            margin-bottom: 20px;
            color: #333;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            font-size: 14px;
            color: #555;
        }

        .input-group input {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
        }

        .input-group input:focus {
            border-color: #25b09b;
            outline: none;
        }

        .btn {
            width: 100%;
            padding: 10px;
            background-color: #25b09b;
            border: none;
            border-radius: 5px;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .btn:hover {
            background-color: #1e9a7b;
        }

        .signup-link {
            margin-top: 15px;
            font-size: 14px;
        }

        .signup-link a {
            color: #25b09b;
            text-decoration: none;
        }

        .signup-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <!-- Loader Animation (initially shown for 2 seconds) -->
    <div class="loader-container" id="loader-container">
        <div class="loader"></div>
    </div>

    <!-- Sign In Form -->
    <div class="login-container" id="login-container">
        <div class="login-box">
            <h2>Sign In</h2>
            <form id="signin-form">
                <div class="input-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required placeholder="Enter your email">
                </div>
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required placeholder="Enter your password">
                </div>
                <button type="submit" class="btn" id="signin-btn">Sign In</button>
            </form>
            <p class="signup-link">Don't have an account? <a href="#">Sign Up</a></p>
        </div>
    </div>

    <script>
        // Initial loader animation for 2 seconds after the page loads
        window.onload = function() {
            setTimeout(function() {
                // Hide the loader after 2 seconds
                document.getElementById('loader-container').style.display = 'none';
                document.getElementById('login-container').style.opacity = 1; // Show the sign-in form
            }, 2000); // Show the loader for 2 seconds
        };

        // Simulate form submission and redirection after Sign In
        document.getElementById('signin-btn').addEventListener('click', function(event) {
            event.preventDefault(); // Prevent form submission

            // Show loader animation for 2 seconds when the Sign In button is clicked
            document.getElementById('loader-container').style.display = 'flex';
            document.getElementById('login-container').style.opacity = 0; // Fade out the login form

            // Redirect to dashboard after 2 seconds (animation duration)
            setTimeout(function() {
                window.location.href = "dashboard.html";  // Replace with the actual URL of your dashboard page
            }, 2000);  // Animation duration: 2 seconds
        });
    </script>

</body>
</html>
